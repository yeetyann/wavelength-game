<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wavelength Game</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#dff4ef">
</head>
<body>
    <main class="app-shell">
        <h1>Wavelength</h1>
        <h2 id="prompt-title">Lade Prompt...</h2>

        <div id="axis">
            <span id="left-label">...</span>
            <span id="right-label">...</span>
        </div>

        <div id="target-container">
            <button id="reveal-btn">Ziel anzeigen (Clue-Giver)</button>
            <div id="target" class="hidden"></div>
        </div>

        <div id="gauge-container">
            <canvas id="gauge" width="400" height="220"></canvas>
            <div id="guess-value">5</div>
        </div>

        <button id="submit-btn">Guess abschicken</button>
        <div id="result"></div>
        <button id="new-round">Neue Runde</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
